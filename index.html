<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photofeed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --accent:    #58a6ff;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --tag-bg:    #1f2937;
      --radius:    8px;
      --card-max:  680px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(13, 17, 23, 0.92);
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    .site-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .site-title span {
      color: var(--accent);
    }

    .post-count {
      font-size: 13px;
      color: var(--muted);
    }

    /* ── Feed ── */
    main {
      max-width: var(--card-max);
      margin: 40px auto;
      padding: 0 16px 80px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 24px;
      border-left: 3px solid transparent;
      transition: border-left-color 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      border-left-color: var(--accent);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }

    .card-image {
      width: 100%;
      display: block;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: var(--bg);
    }

    /* Placeholder shown when image is missing */
    .card-image-placeholder {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: linear-gradient(135deg, #1a2030 0%, #0d1117 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.05em;
    }

    .card-body {
      padding: 18px 20px 20px;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .card-date {
      font-size: 12px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .card-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .card-caption {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 14px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      background: var(--tag-bg);
      color: var(--accent);
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: 0.02em;
    }

    /* ── Loading / Error ── */
    #status {
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
      font-size: 14px;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 12px;
      border-top: 1px solid var(--border);
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      header { padding: 14px 16px; }
      .card-body { padding: 14px 16px 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="site-title">photo<span>feed</span></div>
  <div class="post-count" id="post-count"></div>
</header>

<main>
  <div id="status">Loading posts…</div>
  <div id="feed"></div>
</main>

<footer>
  Built for GitHub Pages &mdash;
  <a href="https://github.com/" target="_blank" rel="noopener">View source</a>
</footer>

<script>
  // ── Helpers ──────────────────────────────────────────────
  function formatDate(dateStr) {
    const d = new Date(dateStr + "T00:00:00");
    return d.toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
  }

  function buildCard(post) {
    const card = document.createElement("article");
    card.className = "card";

    // Image or placeholder
    let imageHtml;
    if (post.image) {
      imageHtml = `<img class="card-image" src="${post.image}" alt="${post.title}" loading="lazy" onerror="this.replaceWith(makePlaceholder())">`;
    } else {
      imageHtml = `<div class="card-image-placeholder">no image</div>`;
    }

    // Tags
    const tagsHtml = (post.tags || [])
      .map(t => `<span class="tag">#${t}</span>`)
      .join("");

    card.innerHTML = `
      ${imageHtml}
      <div class="card-body">
        <div class="card-meta">
          <time class="card-date" datetime="${post.date}">${formatDate(post.date)}</time>
        </div>
        <h2 class="card-title">${post.title}</h2>
        ${post.caption ? `<p class="card-caption">${post.caption}</p>` : ""}
        ${tagsHtml ? `<div class="tags">${tagsHtml}</div>` : ""}
      </div>`;

    return card;
  }

  function makePlaceholder() {
    const div = document.createElement("div");
    div.className = "card-image-placeholder";
    div.textContent = "image not found";
    return div;
  }

  // ── Load posts ────────────────────────────────────────────
  async function loadFeed() {
    const statusEl = document.getElementById("status");
    const feedEl   = document.getElementById("feed");
    const countEl  = document.getElementById("post-count");

    try {
      const res = await fetch("data/posts.json");
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const posts = await res.json();

      statusEl.remove();

      // Newest first
      posts.sort((a, b) => new Date(b.date) - new Date(a.date));

      countEl.textContent = `${posts.length} post${posts.length !== 1 ? "s" : ""}`;

      posts.forEach(post => feedEl.appendChild(buildCard(post)));

    } catch (err) {
      statusEl.textContent = "Could not load posts. Make sure data/posts.json exists.";
      console.error(err);
    }
  }

  loadFeed();
</script>

</body>
</html>
